name: Android APK

on:
  push:
    branches: ["main"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Test media pipeline
        run: gradle testDebugUnitTest

      - name: Validate browser camera hook
        run: node tools/check-virtual-camera-script.mjs

      - name: Android static analysis
        run: gradle lintDebug

      - name: Build debug APKs
        run: gradle assembleDebug

      - name: Upload APKs
        uses: actions/upload-artifact@v4
        with:
          name: camexch-debug-apks
          path: |
            source/build/outputs/apk/debug/*.apk
            browser/build/outputs/apk/debug/*.apk
